  /api/travellers:
    get:
      tags: [Travellers]
      summary: Список мандрівників (з пагінацією)
      description: |
        Повертає користувачів, які мають хоча б одну нотатку (`articlesAmount > 0`),
        відсортованих за кількістю нотаток від найбільшої.
        Email не включається у відповідь.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - in: query
          name: perPage
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Кількість елементів на сторінці (за замовчуванням 10)
      responses:
        '200':
          description: Пагінований список мандрівників
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTravellers'
              example:
                data:
                  users:
                    - _id: '642f9d1a2b3c4d5e6f7a8b9c'
                      name: 'Іван Мандрівник'
                      avatarUrl: 'https://res.cloudinary.com/dpmlsqm9h/image/upload/default_avatar.png'
                      articlesAmount: 12
                      savedArticles:
                        - '643a1b2c3d4e5f6a7b8c9d0e'
                  page: 1
                  perPage: 10
                  totalItems: 35
                  totalPages: 4
                  hasNextPage: true
                  hasPreviousPage: false
