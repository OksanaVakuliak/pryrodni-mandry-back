openapi: 3.0.3
info:
  title: Pryrodni Mandry API
  version: 1.0.0
  description: REST API for Pryrodni Mandry backend
servers:
  - url: http://localhost:4000

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: accessToken

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalidInput:
              value:
                status: 400
                message: 'Invalid request data'
                details:
                  field: 'title'
                  issue: 'required'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            noToken:
              value:
                status: 401
                message: 'Missing access token'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            notFound:
              value:
                status: 404
                message: 'Resource not found'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            alreadyExists:
              value:
                status: 409
                message: 'User with this email already exists'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            serverError:
              value:
                status: 500
                message: 'Internal server error'

  schemas:
    Error:
      type: object
      properties:
        status:
          type: integer
        message:
          type: string
        details:
          type: object
      required: [message]
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        avatar:
          type: string
      required: [_id, name, email]

    Story:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        article:
          type: string
        img:
          type: string
        category:
          $ref: '#/components/schemas/Category'
        ownerId:
          $ref: '#/components/schemas/User'
        rate:
          type: number
        date:
          type: string
        savedByUsers:
          type: array
          items:
            $ref: '#/components/schemas/User'

    PaginatedStories:
      type: object
      properties:
        page:
          type: integer
        perPage:
          type: integer
        totalPages:
          type: integer
        totalStories:
          type: integer
        hasNextPage:
          type: boolean
        stories:
          type: array
          items:
            $ref: '#/components/schemas/Story'

    Category:
      type: object
      properties:
        _id:
          type: string
        category:
          type: string
      required: [_id, category]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                success:
                  value:
                    _id: '642f9d...'
                    name: 'Jane Doe'
                    email: 'jane@example.com'
                    avatar: 'https://.../avatar.png'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in user (cookies set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                success:
                  value:
                    _id: '642f9d...'
                    name: 'Jane Doe'
                    email: 'jane@example.com'
                    avatar: 'https://.../avatar.png'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Logout (clears cookies)
      responses:
        '204':
          description: Logged out

  /auth/refresh:
    post:
      summary: Refresh session tokens
      responses:
        '200':
          description: Session refreshed

  /categories:
    get:
      summary: List categories
      responses:
        '200':
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
              examples:
                success:
                  value:
                    - _id: '641a...'
                      category: 'Nature'
                    - _id: '641b...'
                      category: 'Mountains'
        '500':
          $ref: '#/components/responses/InternalError'

  /stories:
    get:
      summary: Get all stories (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: perPage
          schema:
            type: integer
        - in: query
          name: category
          schema:
            type: string
      responses:
        '200':
          description: Paginated stories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStories'
              examples:
                success:
                  value:
                    page: 1
                    perPage: 6
                    totalPages: 2
                    totalStories: 10
                    hasNextPage: true
                    stories:
                      - _id: '643...'
                        title: 'Hike in the Carpathians'
                        article: '...'
                        img: 'https://.../img.jpg'
                        category:
                          _id: '641a...'
                          category: 'Mountains'
                        ownerId:
                          _id: '642f...'
                          name: 'Jane Doe'
                        rate: 5
                        date: '2026-03-28'
    post:
      summary: Create a story (authenticated)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                article:
                  type: string
                category:
                  type: string
                img:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created story
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
              examples:
                success:
                  value:
                    _id: '643...'
                    title: 'Hike in the Carpathians'
                    article: '...'
                    img: 'https://.../img.jpg'
                    category:
                      _id: '641a...'
                      category: 'Mountains'
                    ownerId:
                      _id: '642f...'
                      name: 'Jane Doe'
                    rate: 0
                    date: '2026-03-28'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /stories/popular:
    get:
      summary: Get popular stories
      responses:
        '200':
          description: List of popular stories

  /stories/{id}:
    get:
      summary: Get story by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Story
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Story'
              examples:
                success:
                  value:
                    _id: '643...'
                    title: 'Hike in the Carpathians'
                    article: 'Full text...'
                    img: 'https://.../img.jpg'
                    category:
                      _id: '641a...'
                      category: 'Mountains'
                    ownerId:
                      _id: '642f...'
                      name: 'Jane Doe'
                    rate: 5
                    date: '2026-03-28'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /stories/{id}/recommended:
    get:
      summary: Get recommended stories for a given story
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of recommended stories

  /stories/{id}/save:
    patch:
      summary: Save (bookmark) a story for the current user
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Saved
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /stories/{id}/delete:
    patch:
      summary: Unsave a story for the current user
      security:
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Unsaved
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/BadRequest'

  /profile/me:
    get:
      summary: Get current user profile
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /profile/my-stories:
    get:
      summary: Get stories of current user (paginated)
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: perPage
          schema:
            type: integer
      responses:
        '200':
          description: Paginated stories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStories'
          '401':
            $ref: '#/components/responses/Unauthorized'

  /profile/saved-stories:
    get:
      summary: Get saved stories for current user
      security:
        - cookieAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: perPage
          schema:
            type: integer
      responses:
        '200':
          description: Paginated saved stories
          '401':
            $ref: '#/components/responses/Unauthorized'

  /profile/edit:
    patch:
      summary: Update current user profile (multipart)
      security:
        - cookieAuth: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                password:
                  type: string
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                success:
                  value:
                    _id: '642f...'
                    name: 'Jane Doe'
                    email: 'jane@example.com'
                    avatar: 'https://.../avatar.png'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /travellers:
    get:
      summary: List travellers (paginated)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Paginated travellers
        '500':
          $ref: '#/components/responses/InternalError'

  /travellers/{id}:
    get:
      summary: Get traveller profile by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Traveller profile
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /travellers/{id}/stories:
    get:
      summary: Get stories for a traveller
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Paginated stories for traveller
        '400':
          $ref: '#/components/responses/BadRequest'
